            const location = useLocation();
            const exportCardRef = useRef(null);
            const tarotSpread = Array.isArray(location.state?.tarotSpread)
                ? location.state.tarotSpread
                : location.state?.tarotPick
                ? [location.state.tarotPick]
                : [];
            const birthData = location.state?.birthData || null;
            const finalScores = location.state?.finalScores || { drive: 0, relation: 0, decision: 0 };
            const finalAnswers = location.state?.finalAnswers || [];

            if (!tarotSpread.length || !birthData) {
                return (
                    <AppScreen>
                        <main className="flex-1 px-6 flex flex-col items-center justify-center gap-4 text-center">
                            <h2 className="text-2xl font-black text-slate-900 dark:text-white">분석 정보가 부족합니다</h2>
                            <p className="text-sm text-slate-500 dark:text-slate-400">타로 3장 뽑기부터 다시 진행해주세요.</p>
                            <button onClick={() => navigate('/tarot')} className="px-5 h-11 rounded-xl bg-primary text-white font-bold">다시 시작</button>
                        </main>
                    </AppScreen>
                );
            }

            const birthYear = Number.parseInt((birthData.date || '').slice(0, 4), 10) || 1996;
            const baseIndex = normalizeMod(birthYear - 4, 12);
            const tarotIndexShift = tarotShiftValue(tarotSpread);
            const qShift = normalizeMod(finalScores.drive * 2 + finalScores.relation + finalScores.decision, 12);
            const zodiacIndex = normalizeMod(baseIndex + tarotIndexShift + qShift, 12);
            const zodiac = ZODIAC_DATA[zodiacIndex];
            const profile = ZODIAC_PROFILE_MAP[zodiac.key];
            const tarotFocusCard = tarotSpread[1] || tarotSpread[0];
            const userScores = computeUserScores({
                psychVector: birthData?.psychVector,
                finalScores,
                tarotSpread,
            });
            const personalizedScores = personalizeScores(profile.baseScores, userScores, 0.35);

            const topKeywords = inferKeywords(personalizedScores);
            const axisNarratives = generateAxisNarratives(personalizedScores);
            const handleSaveStrategyImage = async () => {
                try {
                    const target = exportCardRef.current;
                    if (!target) return;
                    if (!window.html2canvas) {
                        alert('이미지 저장 라이브러리를 찾을 수 없습니다.');
                        return;
                    }
                    const canvas = await window.html2canvas(target, {
                        scale: 3,
                        backgroundColor: '#f8f6f2',
                        useCORS: true,
                    });
                    const link = document.createElement('a');
                    link.href = canvas.toDataURL('image/png');
                    link.download = `life-position-${zodiac.key}-strategy.png`;
                    link.click();
                } catch (error) {
                    alert('이미지 저장 중 오류가 발생했습니다.');
                }
            };

            return (
                <AppScreen>
                    <div className="fixed -left-[99999px] top-0 pointer-events-none">
                        <div
                            ref={exportCardRef}
                            style={{
                                width: '1080px',
                                minHeight: '1500px',
                                padding: '64px',
                                background: 'linear-gradient(160deg, #f8f6f2 0%, #efe8dc 55%, #e7dccb 100%)',
                                color: '#2f2415',
                                fontFamily: "'Noto Sans KR', 'Plus Jakarta Sans', sans-serif",
                            }}
                        >
                            <div style={{ border: '2px solid rgba(97,69,39,0.35)', borderRadius: '28px', padding: '28px 30px', background: 'rgba(255,255,255,0.56)' }}>
                                <div style={{ fontSize: '20px', fontWeight: 900, letterSpacing: '0.08em', marginBottom: '10px' }}>LIFE POSITION STRATEGY CARD</div>
                                <div style={{ fontSize: '52px', fontWeight: 900, lineHeight: 1.15 }}>{zodiac.emoji} {zodiac.label}상</div>
                                <div style={{ marginTop: '10px', fontSize: '28px', fontWeight: 700 }}>{profile.type} · {zodiac.archetype}</div>
                                <div style={{ marginTop: '16px', display: 'flex', gap: '10px', flexWrap: 'wrap' }}>
                                    {topKeywords.map((k) => (
                                        <span key={k} style={{ fontSize: '20px', fontWeight: 700, padding: '8px 16px', borderRadius: '999px', border: '1px solid rgba(97,69,39,0.25)', background: 'rgba(255,255,255,0.75)' }}>
                                            {k}
                                        </span>
                                    ))}
                                </div>
                            </div>

                            <div style={{ marginTop: '22px', borderRadius: '24px', overflow: 'hidden', border: '2px solid rgba(97,69,39,0.25)' }}>
                                <img src={zodiac.image} alt="" style={{ width: '100%', display: 'block' }} />
                            </div>

                            <div style={{ marginTop: '22px', border: '2px solid rgba(97,69,39,0.22)', borderRadius: '24px', padding: '24px', background: 'rgba(255,255,255,0.58)' }}>
                                <div style={{ fontSize: '26px', fontWeight: 900, marginBottom: '14px' }}>6축 개인화 점수</div>
                                <div style={{ display: 'grid', gap: '12px' }}>
                                    {AXIS.map((axis) => {
                                        const v = Math.round(personalizedScores?.[axis.key] ?? 50);
                                        return (
                                            <div key={axis.key}>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '6px', fontSize: '20px', fontWeight: 700 }}>
                                                    <span>{axis.label}</span>
                                                    <span>{v}</span>
                                                </div>
                                                <div style={{ height: '14px', borderRadius: '999px', background: 'rgba(97,69,39,0.12)', overflow: 'hidden' }}>
                                                    <div style={{ width: `${v}%`, height: '100%', borderRadius: '999px', background: 'linear-gradient(90deg, #9f6a31 0%, #d38e44 100%)' }}></div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            <div style={{ marginTop: '22px', border: '2px solid rgba(97,69,39,0.22)', borderRadius: '24px', padding: '24px', background: 'rgba(255,255,255,0.58)' }}>
                                <div style={{ fontSize: '26px', fontWeight: 900, marginBottom: '10px' }}>오늘의 1문장 액션 TOP3</div>
                                {axisNarratives.slice(0, 3).map((n) => (
                                    <div key={n.key} style={{ fontSize: '21px', lineHeight: 1.5, marginTop: '8px' }}>
                                        • <b>{n.label}</b>: {n.action}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <header className="flex items-center px-4 py-3 sticky top-0 z-50 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md border-b border-slate-100/50 dark:border-slate-800/50">
                        <button onClick={() => navigate(-1)} className="w-10 h-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 flex items-center justify-center">
                            <span className="material-symbols-outlined">arrow_back</span>
                        </button>
                        <h1 className="text-base font-bold flex-1 text-center tracking-tight">12지신 분석 결과</h1>
                        <button onClick={() => navigate('/')} className="w-10 h-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 flex items-center justify-center">
                            <span className="material-symbols-outlined">close</span>
                        </button>
                    </header>

                    <main className="flex-1 pb-28 px-5 overflow-y-auto">
                        <div className="mt-5 rounded-3xl border border-slate-200 dark:border-slate-700 bg-surface-light dark:bg-surface-dark p-5">
                            <div className="text-xs font-bold text-primary/80 tracking-wider">당신의 동물</div>
                            <h2 className="mt-1 text-3xl font-black text-slate-900 dark:text-white">{zodiac.emoji} {zodiac.label}상</h2>
                            <p className="mt-2 text-sm text-slate-600 dark:text-slate-300">한 줄 정체성: "{profile.type} - {zodiac.archetype} 실전형"</p>
                            <div className="mt-3 flex flex-wrap gap-2">
                                {topKeywords.map((k) => (
                                    <span key={k} className="px-2.5 py-1 rounded-full text-[11px] font-semibold bg-primary/10 text-primary border border-primary/20">{k}</span>
                                ))}
                            </div>
                        </div>

                        <div className="mt-5 rounded-3xl border border-slate-200 dark:border-slate-700 overflow-hidden shadow-lg">
                            <img src={zodiac.image} alt={`${zodiac.label} 이미지`} className="w-full h-auto object-cover" />
                        </div>

                        <div className="mt-6 grid grid-cols-1 gap-4">
                            <RadarChart
                                title="성향 레이더(개인화)"
                                baseScores={profile.baseScores}
                                personalScores={personalizedScores}
                                size={290}
                            />
                            <ScoreBars
                                title="점수 보드 + 투자 라벨"
                                scores={personalizedScores}
                            />
                            <div className="rounded-2xl border border-slate-200 dark:border-slate-700 bg-white/80 dark:bg-surface-dark p-5 shadow-sm">
                                <div className="text-sm font-extrabold text-slate-900 dark:text-white">자동 해석 리포트 (점수 구간 기반)</div>
                                <div className="mt-1 text-xs text-slate-500 dark:text-slate-400">0~49: 안정/보완, 50~74: 균형, 75~100: 강점 극대화 구간</div>
                                <div className="mt-4 space-y-3">
                                    {axisNarratives.map((n) => (
                                        <div key={n.key} className="rounded-xl border border-slate-200/80 dark:border-white/10 p-4 bg-white/70 dark:bg-black/10 shadow-sm">
                                            <div className="flex items-center justify-between gap-3 mb-2">
                                                <div className="text-sm font-extrabold text-slate-800 dark:text-slate-100">{n.label}</div>
                                                <div className="px-2.5 py-1 rounded-full text-sm font-black bg-primary/12 border border-primary/25 text-primary">{n.value}</div>
                                            </div>
                                            <div className="h-2 rounded-full bg-slate-200 dark:bg-slate-700 overflow-hidden mb-3">
                                                <div className="h-full bg-primary rounded-full" style={{ width: `${n.value}%` }}></div>
                                            </div>
                                            <p className="text-sm leading-6 text-slate-700 dark:text-slate-200"><b>강점:</b> {n.strength}</p>
                                            <p className="mt-2 text-sm leading-6 text-rose-600 dark:text-rose-300"><b>주의:</b> {n.caution}</p>
                                            <p className="mt-2 text-sm leading-6 font-semibold text-emerald-700 dark:text-emerald-300"><b>오늘의 1문장 액션:</b> {n.action}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <ProfileSummaryCard profile={profile} />

                            <div className="rounded-2xl border border-slate-200 dark:border-slate-700 bg-surface-light dark:bg-surface-dark p-5">
                                <div className="text-sm font-bold text-slate-900 dark:text-white mb-3">실행 버튼</div>
                                <div className="grid gap-2">
                                    <button onClick={handleSaveStrategyImage} className="h-11 rounded-xl bg-primary text-white font-bold">
                                        내 전략 카드 PNG 저장
                                    </button>
                                    <button onClick={() => alert('3개월 루틴 가이드를 생성했습니다.')} className="h-11 rounded-xl bg-slate-900 text-white dark:bg-slate-100 dark:text-slate-900 font-bold">
                                        3개월 루틴 받기
                                    </button>
                                    <button onClick={() => alert(personalizedScores.risk >= 60 ? '방어 모드 기준으로 재해석했습니다.' : '공격 모드 기준으로 재해석했습니다.')} className="h-11 rounded-xl border border-slate-300 dark:border-slate-700 font-bold text-slate-800 dark:text-slate-100">
                                        투자 모드(공격/방어)로 재해석
                                    </button>
                                </div>
                            </div>
                        </div>
                    </main>

                    <div className="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background-light via-background-light/95 to-transparent dark:from-background-dark dark:via-background-dark/95">
                        <button onClick={() => navigate('/tarot')} className="w-full h-14 rounded-2xl font-bold text-lg bg-primary text-white shadow-glow active:scale-[0.98]">
                            다시 시작하기
                        </button>
                    </div>
                </AppScreen>
            );
        };

        // --- App Shell ---
        const App = () => {
            return (
                <HashRouter>
                    <Routes>
                        <Route path="/" element={<LandingScreen />} />
                        <Route path="/birth" element={<BirthInputScreen />} />
                        <Route path="/final-questions" element={<FinalQuestionsScreen />} />
                        <Route path="/tarot" element={<TarotScreen />} />
                        <Route path="/result" element={<ResultScreen />} />
                        <Route path="/result3" element={<ResultScreen />} />
                    </Routes>
                </HashRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
        window.__APP_RENDERED__ = true;
        } catch (error) {
            const root = document.getElementById('root');
            if (root) {
                root.textContent = `앱 초기화 실패: ${error?.message || error}`;
            }
        }
    </script>
</body>
</html>
