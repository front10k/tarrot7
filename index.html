                }
                const base = suitShift[card.suit] || 0;
                return acc + base + (card.rank || 0) + (card.reversed ? 2 : 0) + idx;
            }, 0);
            return normalizeMod(total, 12);
        };

        const FinalQuestionsScreen = () => {
            const navigate = useNavigate();
            const location = useLocation();
            const tarotSpread = Array.isArray(location.state?.tarotSpread)
                ? location.state.tarotSpread
                : location.state?.tarotPick
                ? [location.state.tarotPick]
                : [];
            const birthData = location.state?.birthData || null;

            const [index, setIndex] = useState(0);
            const [scores, setScores] = useState({ drive: 0, relation: 0, decision: 0 });
            const [answers, setAnswers] = useState([]);

            const current = FINAL_QUESTIONS[index];
            const progress = Math.round(((index + 1) / FINAL_QUESTIONS.length) * 100);

            const onSelect = (optionKey) => {
                const option = current.options[optionKey];
                const nextScores = {
                    drive: scores.drive + option.delta.drive,
                    relation: scores.relation + option.delta.relation,
                    decision: scores.decision + option.delta.decision,
                };
                const nextAnswers = [...answers, { id: current.id, option: optionKey, label: option.label }];
                const isLast = index + 1 >= FINAL_QUESTIONS.length;

                setScores(nextScores);
                setAnswers(nextAnswers);

                if (isLast) {
                    navigate('/result3', {
                        state: {
                            tarotSpread,
                            birthData,
                            finalScores: nextScores,
                            finalAnswers: nextAnswers,
                        },
                    });
                    return;
                }
                setIndex((prev) => prev + 1);
            };

            return (
                <AppScreen frameClassName="text-slate-900 dark:text-slate-100">
                    <header className="px-6 pt-6 pb-3">
                        <div className="flex items-center justify-between mb-4">
                            <button onClick={() => navigate(-1)} className="w-10 h-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 flex items-center justify-center">
                                <span className="material-symbols-outlined">arrow_back</span>
                            </button>
                            <div className="text-xs font-bold tracking-widest text-primary uppercase">마지막 질문</div>
                            <button onClick={() => navigate('/')} className="w-10 h-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 flex items-center justify-center">
                                <span className="material-symbols-outlined">close</span>
                            </button>
                        </div>
                        <div className="flex justify-between items-end px-1 mb-2">
                            <span className="text-[11px] font-semibold text-primary/80 uppercase tracking-wider">보정 단계</span>
                            <span className="text-sm font-bold text-primary">3 <span className="text-slate-400 dark:text-slate-600 font-light text-xs ml-1">/ 4</span></span>
                        </div>
                        <div className="h-2 w-full bg-slate-100 dark:bg-slate-800 rounded-full overflow-hidden">
                            <div className="h-full bg-primary rounded-full transition-all duration-500" style={{ width: `${progress}%` }}></div>
                        </div>
                    </header>

                    <main className="flex-1 px-6 pb-8">
                        <div className="mt-6 mb-6">
                            <h2 className="text-2xl font-black leading-snug text-slate-900 dark:text-white">{current.text}</h2>
                            <p className="mt-2 text-sm text-slate-500 dark:text-slate-400">사주와 타로로 부족한 부분을 보정해 12지신 결과를 정밀화합니다.</p>
                        </div>

                        <div className="space-y-3">
                            {Object.entries(current.options).map(([key, option]) => (
                                <button
                                    key={key}
                                    onClick={() => onSelect(key)}
                                    className="w-full text-left p-4 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-surface-dark hover:border-primary/60 transition-all"
                                >
                                    <div className="text-sm font-semibold text-slate-800 dark:text-slate-100 leading-relaxed">{option.label}</div>
                                </button>
                            ))}
                        </div>
                    </main>
                </AppScreen>
            );
        };

        const TarotScreen = () => {
            const navigate = useNavigate();
            const [deck, setDeck] = useState([]);
            const [drawn, setDrawn] = useState([]);
            const [phase, setPhase] = useState('idle');

            useEffect(() => {
                setDeck(shuffleCards(TAROT78));
                setDrawn([]);
                setPhase('idle');
            }, []);

            const drawOne = () => {
                if (phase === 'drawing') return;
                if (drawn.length >= 3) return;
                const nextMeta = deck[drawn.length];
                if (!nextMeta) return;

                setPhase('drawing');
                const picked = { ...nextMeta, reversed: Math.random() < 0.5 };
                setTimeout(() => {
                    const nextSpread = [...drawn, picked];
                    setDrawn(nextSpread);
                    setPhase(nextSpread.length >= 3 ? 'done' : 'idle');
                }, 120);
            };

            return (
                <AppScreen>
                    <header className="flex items-center justify-between p-4">
                        <button onClick={() => navigate('/')} className="flex size-10 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800">
                            <span className="material-symbols-outlined text-[24px]">arrow_back</span>
                        </button>
                        <div className="text-center">
                            <div className="text-sm font-bold tracking-widest uppercase">타로 3장 뽑기</div>
                            <div className="text-xs text-slate-500 dark:text-slate-400">버튼을 눌러 한 장씩 공개합니다</div>
                        </div>
                        <button onClick={() => navigate('/')} className="flex size-10 items-center justify-center rounded-full hover:bg-slate-200 dark:hover:bg-slate-800">
                            <span className="material-symbols-outlined text-[24px]">close</span>
                        </button>
                    </header>

                    <main className="flex-1 px-5 pt-4 pb-28 overflow-y-auto">
                        <div className="rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 p-2 overflow-x-auto no-scrollbar">
                            <div className="flex gap-1.5 min-w-max">
                                {Array.from({ length: 18 }, (_, idx) => (
                                    <div key={idx} className="w-[52px] h-[78px] rounded-lg overflow-hidden border border-slate-300/80 dark:border-slate-600/80 shadow-sm">
                                        <div className="w-full h-full bg-cover bg-center" style={{ backgroundImage: `url('${TAROT_BACK_IMAGE}')` }}></div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="rounded-3xl border border-slate-200/80 dark:border-slate-700/80 bg-white/80 dark:bg-slate-900/70 p-4 shadow-sm">
                            <div className="grid grid-cols-3 gap-3">
                                {[0, 1, 2].map((idx) => {
                                    const card = drawn[idx];
                                    return (
                                        <div key={idx} className="flex flex-col items-center">
                                            <div className="relative w-full aspect-[3/5] rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700 bg-slate-100 dark:bg-slate-800 shadow-sm">
                                                {card ? (
                                                    <>
                                                        <div
                                                            className="absolute inset-0 bg-cover bg-center"
                                                            style={{
                                                                backgroundImage: `url('${card.image_front}')`,
                                                                transform: card.reversed ? 'rotate(180deg)' : 'none',
                                                            }}
                                                        ></div>
                                                        <div className="absolute top-1.5 right-1.5 px-1.5 py-0.5 rounded bg-black/60 text-white text-[10px] font-bold">
                                                            {card.reversed ? '역' : '정'}
                                                        </div>
                                                    </>
                                                ) : (
                                                    <div className="w-full h-full flex items-center justify-center">
                                                        <span className="text-xs text-slate-400">대기</span>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {drawn.length > 0 && (
                            <div className="mt-4 flex flex-col items-center">
                                <div className="relative w-[220px] h-[330px] rounded-3xl overflow-hidden border border-slate-200 dark:border-slate-700 shadow-xl">
                                    <div
                                        className="absolute inset-0 bg-cover bg-center"
                                        style={{
                                            backgroundImage: `url('${drawn[drawn.length - 1].image_front}')`,
                                            transform: drawn[drawn.length - 1].reversed ? 'rotate(180deg)' : 'none',
                                        }}
                                    ></div>
                                    <div className="absolute left-3 right-3 bottom-3 rounded-lg bg-black/55 text-white text-xs font-semibold text-center py-1.5">
                                        {drawn[drawn.length - 1].label_kr} {drawn[drawn.length - 1].reversed ? '(역)' : '(정)'}
                                    </div>
                                </div>
                                <p className="mt-4 text-sm text-slate-600 dark:text-slate-300 text-center leading-relaxed">
                                    {readMeaning(drawn[drawn.length - 1])?.summary || '지금의 흐름을 담은 카드가 선택되었습니다.'}
                                </p>
                            </div>
                        )}
                    </main>

                    <div className="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background-light via-background-light/95 to-transparent dark:from-background-dark dark:via-background-dark/95">
                        <button
                            onClick={() =>
                                drawn.length < 3
                                    ? drawOne()
                                    : navigate('/birth', { state: { tarotSpread: drawn } })
                            }
                            disabled={phase === 'drawing'}
                            className={`w-full h-14 rounded-2xl font-bold text-lg transition-all ${
                                phase === 'drawing' ? 'bg-slate-200 text-slate-500 dark:bg-slate-800 dark:text-slate-500' : 'bg-primary text-white shadow-glow'
                            }`}
                        >
                            {drawn.length < 3 ? `카드 뽑기 (${drawn.length + 1}/3)` : '사주 입력으로 이동'}
                        </button>
                    </div>
                </AppScreen>
            );
        };

        const ResultScreen = () => {
            const navigate = useNavigate();
            const location = useLocation();
            const tarotSpread = Array.isArray(location.state?.tarotSpread)
                ? location.state.tarotSpread
                : location.state?.tarotPick
                ? [location.state.tarotPick]
                : [];
            const birthData = location.state?.birthData || null;
            const finalScores = location.state?.finalScores || { drive: 0, relation: 0, decision: 0 };
            const finalAnswers = location.state?.finalAnswers || [];

            if (!tarotSpread.length || !birthData) {
                return (
                    <AppScreen>
                        <main className="flex-1 px-6 flex flex-col items-center justify-center gap-4 text-center">
                            <h2 className="text-2xl font-black text-slate-900 dark:text-white">분석 정보가 부족합니다</h2>
                            <p className="text-sm text-slate-500 dark:text-slate-400">타로 3장 뽑기부터 다시 진행해주세요.</p>
                            <button onClick={() => navigate('/tarot')} className="px-5 h-11 rounded-xl bg-primary text-white font-bold">다시 시작</button>
                        </main>
                    </AppScreen>
                );
            }

            const birthYear = Number.parseInt((birthData.date || '').slice(0, 4), 10) || 1996;
            const baseIndex = normalizeMod(birthYear - 4, 12);
            const tarotIndexShift = tarotShiftValue(tarotSpread);
            const qShift = normalizeMod(finalScores.drive * 2 + finalScores.relation + finalScores.decision, 12);
            const zodiacIndex = normalizeMod(baseIndex + tarotIndexShift + qShift, 12);
            const zodiac = ZODIAC_DATA[zodiacIndex];
            const tarotFocusCard = tarotSpread[1] || tarotSpread[0];

            const mbtiTone =
                finalScores.decision >= 2
                    ? 'MBTI의 J 성향처럼 기준을 세우고 정리할수록 안정됩니다.'
                    : finalScores.drive >= 2
                    ? 'MBTI의 P 성향처럼 열린 선택지 속에서 기민하게 움직일 때 강점이 살아납니다.'
                    : '상황에 따라 J/P를 유연하게 오가는 균형형 기질이 보입니다.';

            const relationTone =
                finalScores.relation >= 2
                    ? '혈액형 심리에서 A/B형의 대인 감수성을 섞은 듯, 분위기와 감정 결을 섬세하게 읽습니다.'
                    : finalScores.relation <= -1
                    ? '혈액형 심리의 O형처럼 목표 중심으로 관계를 단순화할 때 성과가 잘 납니다.'
                    : '관계와 목표 사이의 균형을 비교적 안정적으로 유지하는 편입니다.';

            const tarotSummary = readMeaning(tarotFocusCard)?.summary || '선택한 카드에서 핵심 흐름이 확인되었습니다.';
            const tarotKeywords = readKeywords(tarotFocusCard).slice(0, 4).join(' · ');
            const birthTimeText = birthData.unknownTime ? '시간 모름' : `${birthData.hour}:${birthData.minute}`;

            const actionTips = [
                `이번 주에는 '${zodiac.focus}' 중심으로 일정 1개를 먼저 완료하세요.`,
                tarotFocusCard.reversed ? '결정을 미루기보다 검증 단계를 짧게 두고 실행으로 넘어가세요.' : '현재 흐름은 우호적이니 작은 성공 경험을 빠르게 누적하세요.',
            ];

            return (
                <AppScreen>
                    <header className="flex items-center px-4 py-3 sticky top-0 z-50 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md border-b border-slate-100/50 dark:border-slate-800/50">
                        <button onClick={() => navigate(-1)} className="w-10 h-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 flex items-center justify-center">
                            <span className="material-symbols-outlined">arrow_back</span>
                        </button>
                        <h1 className="text-base font-bold flex-1 text-center tracking-tight">12지신 분석 결과</h1>
                        <button onClick={() => navigate('/')} className="w-10 h-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 flex items-center justify-center">
                            <span className="material-symbols-outlined">close</span>
                        </button>
                    </header>

                    <main className="flex-1 pb-28 px-5 overflow-y-auto">
                        <div className="mt-5 text-center">
                            <div className="inline-block px-3 py-1 rounded-full text-xs font-bold tracking-wider bg-primary/10 text-primary border border-primary/20">결과 동물: {zodiac.label}</div>
                            <h2 className="mt-3 text-3xl font-black text-slate-900 dark:text-white">{zodiac.label}상 ({zodiac.archetype})</h2>
                            <p className="mt-2 text-sm text-slate-500 dark:text-slate-400">{zodiac.line}</p>
                        </div>

                        <div className="mt-5 rounded-3xl border border-slate-200 dark:border-slate-700 overflow-hidden shadow-lg">
                            <img src={zodiac.image} alt={`${zodiac.label} 이미지`} className="w-full h-auto object-cover" />
                        </div>

                        <div className="mt-6 grid grid-cols-1 gap-4">
                            <div className="rounded-2xl border border-slate-200 dark:border-slate-700 bg-surface-light dark:bg-surface-dark p-5">
                                <div className="text-xs font-bold text-slate-500 dark:text-slate-400 mb-2">타로에서 읽힌 현재 흐름</div>
                                <div className="text-sm leading-7 text-slate-700 dark:text-slate-200">{tarotSummary}</div>
                                <div className="mt-3 flex flex-wrap gap-2">
                                    {tarotKeywords.split(' · ').filter(Boolean).map((k) => (
                                        <span key={k} className="px-2 py-1 rounded-full text-[11px] font-semibold bg-primary/10 text-primary border border-primary/20">#{k}</span>
                                    ))}
                                </div>
                            </div>

                            <div className="rounded-2xl border border-slate-200 dark:border-slate-700 bg-surface-light dark:bg-surface-dark p-5">
                                <div className="text-xs font-bold text-slate-500 dark:text-slate-400 mb-2">사주 리듬 요약</div>
                                <div className="text-sm leading-7 text-slate-700 dark:text-slate-200">
                                    출생 정보 {birthData.date} ({birthData.calendarType === 'lunar' ? '음력' : '양력'}), {birthTimeText}를 기준으로 보면, 올해는 '{zodiac.focus}'을 전면에 둘 때 흐름이 열리는 패턴입니다.
                                </div>
                            </div>

                            <div className="rounded-2xl border border-slate-200 dark:border-slate-700 bg-surface-light dark:bg-surface-dark p-5">
                                <div className="text-xs font-bold text-slate-500 dark:text-slate-400 mb-2">심리 패턴 해석</div>
                                <div className="text-sm leading-7 text-slate-700 dark:text-slate-200">{mbtiTone}</div>
                                <div className="mt-2 text-sm leading-7 text-slate-700 dark:text-slate-200">{relationTone}</div>
                            </div>

                            <div className="rounded-2xl border border-slate-200 dark:border-slate-700 bg-surface-light dark:bg-surface-dark p-5">
                                <div className="text-xs font-bold text-slate-500 dark:text-slate-400 mb-2">마지막 3문항 반영 포인트</div>
                                <ul className="text-sm leading-7 text-slate-700 dark:text-slate-200 list-disc pl-5">
                                    <li>추진 점수: {finalScores.drive}</li>
                                    <li>관계 점수: {finalScores.relation}</li>
                                    <li>판단 점수: {finalScores.decision}</li>
                                </ul>
                                {finalAnswers.length > 0 && (
                                    <div className="mt-3 text-xs text-slate-500 dark:text-slate-400">선택 요약: {finalAnswers.map((a) => a.option).join(' · ')}</div>
                                )}
                            </div>

                            <div className="rounded-2xl border border-slate-200 dark:border-slate-700 bg-surface-light dark:bg-surface-dark p-5">
                                <div className="text-sm font-bold text-slate-900 dark:text-white mb-3">오늘의 실행 제안</div>
                                <div className="grid gap-2">
                                    {actionTips.map((tip, idx) => (
                                        <div key={idx} className="text-sm font-semibold text-slate-700 dark:text-slate-200 bg-white/70 dark:bg-slate-800/60 rounded-xl p-3 border border-slate-200/80 dark:border-slate-700/80">
                                            {tip}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </main>

                    <div className="absolute bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-background-light via-background-light/95 to-transparent dark:from-background-dark dark:via-background-dark/95">
                        <button onClick={() => navigate('/tarot')} className="w-full h-14 rounded-2xl font-bold text-lg bg-primary text-white shadow-glow active:scale-[0.98]">
                            다시 시작하기
                        </button>
                    </div>
                </AppScreen>
            );
        };

        // --- App Shell ---
        const App = () => {
            return (
                <HashRouter>
                    <Routes>
                        <Route path="/" element={<LandingScreen />} />
                        <Route path="/birth" element={<BirthInputScreen />} />
                        <Route path="/final-questions" element={<FinalQuestionsScreen />} />
                        <Route path="/tarot" element={<TarotScreen />} />
                        <Route path="/result" element={<ResultScreen />} />
                        <Route path="/result3" element={<ResultScreen />} />
                    </Routes>
                </HashRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
        window.__APP_RENDERED__ = true;
        } catch (error) {
            const root = document.getElementById('root');
            if (root) {
                root.textContent = `앱 초기화 실패: ${error?.message || error}`;
            }
        }
    </script>
</body>
</html>
